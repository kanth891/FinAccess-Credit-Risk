<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FinAccess</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav class="navbar" id="navbar"></nav>
    <div id="flashContainer" class="flash-container"></div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-icon"><i class="fa-solid fa-lock"></i></div>
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Sign in to your FinAccess account</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="form-group">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" id="email" name="email" class="form-input"
                           placeholder="you@example.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Enter your password" required autocomplete="current-password">
                        <button type="button" class="toggle-password" onclick="togglePassword('password')"><i class="fa-regular fa-eye"></i></button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="/register" class="auth-link">Create one</a></p>
                <div class="auth-divider"><span>Demo Credentials</span></div>
                <div class="demo-creds">
                    <div class="demo-cred-item">
                        <span class="demo-label">Admin:</span>
                        <span class="demo-value">admin@finaccess.com / admin123</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer"><div class="footer-container">
        <p>&copy; 2024 FinAccess</p>
    </div></footer>

    <script src="/static/js/main.js"></script>
    <script>
        Auth.requireGuest();
        UI.renderNavbar('login');

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            try {
                const data = await API.post('/api/auth/login', {
                    email: document.getElementById('email').value.trim(),
                    password: document.getElementById('password').value
                });
                Auth.setSession(data.token, data.user);
                window.location.href = data.user.is_admin ? '/admin' : '/dashboard';
            } catch (err) {
                Flash.error(err.message);
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
